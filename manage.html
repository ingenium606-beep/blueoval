<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BlueOval — Manage Products</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #0A2540; --blue-light: #E8F0FB; --accent: #C9A84C;
    --white: #FAFAF8; --text: #0A2540; --text-muted: #6B7A8D;
    --border: rgba(10,37,64,0.12); --card-bg: #FFFFFF; --bg: #F4F6FA;
    --error: #E24B4A; --success: #1D9E75;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { min-height: 100vh; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); }

  .top-bar { background: var(--blue); padding: 1rem 1.2rem; position: sticky; top: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between; }
  .top-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 400; color: #FAFAF8; letter-spacing: 0.06em; }
  .top-logo span { color: var(--accent); }
  .top-sub { font-size: 0.6rem; color: rgba(250,250,248,0.4); letter-spacing: 0.18em; text-transform: uppercase; margin-top: 2px; }

  .tabs { display: flex; background: var(--card-bg); border-bottom: 1px solid var(--border); }
  .tab { flex: 1; padding: 0.8rem; text-align: center; font-size: 0.75rem; font-weight: 500; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; letter-spacing: 0.05em; }
  .tab.active { color: var(--blue); border-bottom-color: var(--accent); }

  .body { padding: 1rem; max-width: 480px; margin: 0 auto; }

  .hint { font-size: 0.72rem; color: var(--text-muted); text-align: center; padding: 0.6rem; margin-bottom: 0.8rem; }

  .product-list { display: flex; flex-direction: column; gap: 0.6rem; }

  .product-item {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 4px;
    display: flex; align-items: center; gap: 0.8rem; padding: 0.7rem 0.8rem;
    cursor: grab; transition: box-shadow 0.2s;
    touch-action: none;
  }
  .product-item.dragging { box-shadow: 0 8px 24px rgba(10,37,64,0.15); opacity: 0.9; cursor: grabbing; }
  .product-item.drag-over { border-color: var(--accent); background: var(--blue-light); }

  .drag-handle { color: var(--text-muted); font-size: 1rem; flex-shrink: 0; padding: 0 2px; user-select: none; }
  .product-thumb { width: 48px; height: 48px; border-radius: 3px; object-fit: cover; background: var(--blue-light); flex-shrink: 0; }
  .product-info { flex: 1; min-width: 0; }
  .product-brand { font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); }
  .product-name { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 500; color: var(--blue); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .product-price { font-size: 0.75rem; color: var(--text-muted); margin-top: 1px; }

  .delete-btn { background: none; border: none; color: var(--error); font-size: 1.1rem; cursor: pointer; padding: 4px 6px; flex-shrink: 0; opacity: 0.7; transition: opacity 0.2s; }
  .delete-btn:active { opacity: 1; }

  .save-btn { width: 100%; padding: 0.85rem; background: var(--accent); border: none; border-radius: 3px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500; color: var(--blue); cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 1rem; display: none; }
  .save-btn.visible { display: block; }
  .save-btn:active { opacity: 0.85; }

  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-size: 0.85rem; line-height: 1.6; }

  .status-msg { text-align: center; font-size: 0.8rem; padding: 0.7rem; border-radius: 3px; display: none; margin-top: 0.6rem; }
  .status-msg.success { background: rgba(29,158,117,0.1); color: var(--success); display: block; }
  .status-msg.error { background: rgba(226,75,74,0.1); color: var(--error); display: block; }

  .loading-dots { display: flex; gap: 5px; justify-content: center; padding: 2rem; }
  .loading-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: dot-b 1.2s ease-in-out infinite; }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot-b { 0%,80%,100%{transform:translateY(0);opacity:0.4} 40%{transform:translateY(-5px);opacity:1} }

  .confirm-overlay { position: fixed; inset: 0; background: rgba(10,37,64,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; display: none; }
  .confirm-overlay.visible { display: flex; }
  .confirm-box { background: var(--card-bg); border-radius: 4px; padding: 1.5rem; margin: 1rem; max-width: 320px; width: 100%; }
  .confirm-title { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; color: var(--blue); margin-bottom: 0.5rem; }
  .confirm-text { font-size: 0.82rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 1.2rem; }
  .confirm-btns { display: flex; gap: 0.6rem; }
  .confirm-yes { flex: 1; padding: 0.7rem; background: var(--error); border: none; border-radius: 3px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500; cursor: pointer; }
  .confirm-no { flex: 1; padding: 0.7rem; background: none; border: 1px solid var(--border); border-radius: 3px; color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 0.8rem; cursor: pointer; }
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <div class="top-logo">Blue<span>Oval</span></div>
    <div class="top-sub">Manage Products</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('fashion')">Fashion</div>
  <div class="tab" onclick="switchTab('sneakers')">Sneakers</div>
  <div class="tab" onclick="switchTab('digital')">Digital</div>
</div>

<div class="body">
  <div class="hint">Hold and drag ☰ to reorder. Tap 🗑 to delete.</div>
  <div class="product-list" id="product-list">
    <div class="loading-dots"><span></span><span></span><span></span></div>
  </div>
  <button class="save-btn" id="save-btn" onclick="saveOrder()">Save New Order</button>
  <div class="status-msg" id="status-msg"></div>
</div>

<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-title">Delete Product</div>
    <div class="confirm-text">This will remove the product from BlueOval and delete the Telegram channel post. This cannot be undone.</div>
    <div class="confirm-btns">
      <button class="confirm-yes" onclick="confirmDelete()">Delete</button>
      <button class="confirm-no" onclick="closeConfirm()">Cancel</button>
    </div>
  </div>
</div>

<script>
const BOT_TOKEN = '8731170592:AAGc6ICVUm3N7B7BhOpiu9NlRckVy1bT6yA';
const CHANNEL_ID = '-1003953823996';

let currentTab = 'fashion';
let products = [];
let pendingDelete = null;
let dragSrc = null;
let orderChanged = false;

async function loadProducts(category) {
  const list = document.getElementById('product-list');
  list.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
  document.getElementById('save-btn').classList.remove('visible');
  orderChanged = false;

  try {
    const res = await fetch(`/api/products?category=${category}`);
    const data = await res.json();
    products = data.products || [];
    renderList();
  } catch(e) {
    list.innerHTML = '<div class="empty-state">Failed to load products. Check your connection.</div>';
  }
}

function renderList() {
  const list = document.getElementById('product-list');
  if (products.length === 0) {
    list.innerHTML = `<div class="empty-state">No products in ${currentTab} yet.<br>Add some from the publisher.</div>`;
    return;
  }
  list.innerHTML = '';
  products.forEach((p, i) => {
    const sym = p.currency === 'AED' ? 'AED ' : '$';
    const item = document.createElement('div');
    item.className = 'product-item';
    item.draggable = true;
    item.dataset.id = p.id;
    item.dataset.index = i;
    item.innerHTML = `
      <div class="drag-handle">☰</div>
      <img class="product-thumb" src="${p.imageUrl || ''}" alt="${p.name}" onerror="this.style.background='var(--blue-light)'">
      <div class="product-info">
        <div class="product-brand">${p.brand || currentTab}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-price">${sym}${p.price}</div>
      </div>
      <button class="delete-btn" onclick="askDelete('${p.id}', '${p.telegramMsgId || ''}')">🗑</button>
    `;
    item.addEventListener('dragstart', onDragStart);
    item.addEventListener('dragover', onDragOver);
    item.addEventListener('drop', onDrop);
    item.addEventListener('dragend', onDragEnd);
    list.appendChild(item);
  });
}

function onDragStart(e) {
  dragSrc = this;
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragOver(e) {
  e.preventDefault();
  document.querySelectorAll('.product-item').forEach(i => i.classList.remove('drag-over'));
  this.classList.add('drag-over');
}
function onDrop(e) {
  e.preventDefault();
  if (dragSrc === this) return;
  const srcIdx = parseInt(dragSrc.dataset.index);
  const tgtIdx = parseInt(this.dataset.index);
  const moved = products.splice(srcIdx, 1)[0];
  products.splice(tgtIdx, 0, moved);
  orderChanged = true;
  document.getElementById('save-btn').classList.add('visible');
  renderList();
}
function onDragEnd() {
  document.querySelectorAll('.product-item').forEach(i => {
    i.classList.remove('dragging');
    i.classList.remove('drag-over');
  });
}

async function saveOrder() {
  const btn = document.getElementById('save-btn');
  btn.textContent = 'Saving...';
  btn.disabled = true;
  try {
    const order = products.map(p => p.id);
    await fetch(`/api/products?action=reorder`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ category: currentTab, order })
    });
    showStatus('Order saved!', 'success');
    btn.classList.remove('visible');
    orderChanged = false;
  } catch(e) {
    showStatus('Failed to save order.', 'error');
  }
  btn.textContent = 'Save New Order';
  btn.disabled = false;
}

function askDelete(id, msgId) {
  pendingDelete = { id, msgId };
  document.getElementById('confirm-overlay').classList.add('visible');
}

function closeConfirm() {
  pendingDelete = null;
  document.getElementById('confirm-overlay').classList.remove('visible');
}

async function confirmDelete() {
  if (!pendingDelete) return;
  const { id, msgId } = pendingDelete;
  closeConfirm();

  try {
    // Delete from database
    await fetch(`/api/products?action=delete`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, category: currentTab })
    });

    // Delete from Telegram channel
    if (msgId) {
      await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/deleteMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: CHANNEL_ID, message_id: parseInt(msgId) })
      });
    }

    products = products.filter(p => p.id !== id);
    renderList();
    showStatus('Product deleted.', 'success');
  } catch(e) {
    showStatus('Failed to delete.', 'error');
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab')[['fashion','sneakers','digital'].indexOf(tab)].classList.add('active');
  loadProducts(tab);
}

function showStatus(msg, type) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = `status-msg ${type}`;
  setTimeout(() => el.className = 'status-msg', 3000);
}

loadProducts('fashion');
</script>
</body>
</html>
